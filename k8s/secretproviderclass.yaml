# Maps 11 Google Secret Manager secrets into files mounted at /mnt/secrets/<KEY>
# in pods that reference this SPC. The GKE Autopilot managed CSI provider
# (`provider: gke`) supports file-based mounts but NOT `secretObjects` synthesis,
# so deployments read secrets from the file mount via a small shell wrapper
# in their container command — see `k8s/api-deployment.yaml` for the pattern.
#
# Authentication flow:
#   pod → K8s SA `ai-identity-workload` (iam.gke.io annotation)
#       → GCP SA `ai-identity-workload@...` (Workload Identity)
#       → roles/secretmanager.secretAccessor (per-secret, not project-wide)
#       → Secret Manager returns the value → file at /mnt/secrets/<KEY>
#
# Rotation: add a new version in Secret Manager:
#   printf '%s' "new-value" | gcloud secrets versions add ai-identity-<KEY> --data-file=-
# CSI re-reads on pod start. For immediate propagation, restart pods:
#   kubectl rollout restart deploy/api deploy/gateway -n ai-identity
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-identity-secrets
  namespace: ai-identity
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-AUDIT_HMAC_KEY/versions/latest"
        path: "AUDIT_HMAC_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-CLERK_ISSUER/versions/latest"
        path: "CLERK_ISSUER"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-CREDENTIAL_ENCRYPTION_KEY/versions/latest"
        path: "CREDENTIAL_ENCRYPTION_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-DATABASE_URL/versions/latest"
        path: "DATABASE_URL"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-INTERNAL_SERVICE_KEY/versions/latest"
        path: "INTERNAL_SERVICE_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-PERPLEXITY_API_KEY/versions/latest"
        path: "PERPLEXITY_API_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-REDIS_URL/versions/latest"
        path: "REDIS_URL"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-RESEND_API_KEY/versions/latest"
        path: "RESEND_API_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-SENTRY_DSN/versions/latest"
        path: "SENTRY_DSN"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-STRIPE_SECRET_KEY/versions/latest"
        path: "STRIPE_SECRET_KEY"
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-STRIPE_WEBHOOK_SECRET/versions/latest"
        path: "STRIPE_WEBHOOK_SECRET"
---
# Narrow SPC for cronjobs: only INTERNAL_SERVICE_KEY. Gives cron pods
# least-privilege file access so audit logs show only the one secret they
# actually need, rather than all 11.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-identity-cron-secrets
  namespace: ai-identity
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-8bbb04f8-fda8-462e-bc2/secrets/ai-identity-INTERNAL_SERVICE_KEY/versions/latest"
        path: "INTERNAL_SERVICE_KEY"
