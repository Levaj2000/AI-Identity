# K8s ServiceAccount for AI Identity workloads (api, gateway, cronjobs).
# Bound to GCP SA `ai-identity-workload@PROJECT.iam.gserviceaccount.com` via
# Workload Identity. The GCP SA has `roles/secretmanager.secretAccessor`
# granted per-secret on the 11 ai-identity-* secrets in Secret Manager.
#
# Used by: api deployment, gateway deployment, weekly-user-cleanup cronjob,
# daily-email-followups cronjob.
#
# Provisioned separately by scripts/setup-secret-manager.sh:
#   - the GCP SA itself
#   - the iam.workloadIdentityUser binding (K8s SA → GCP SA)
#   - per-secret secretAccessor bindings
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-identity-workload
  namespace: ai-identity
  annotations:
    iam.gke.io/gcp-service-account: ai-identity-workload@project-8bbb04f8-fda8-462e-bc2.iam.gserviceaccount.com
