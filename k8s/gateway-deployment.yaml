apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ai-identity
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      # App does not call the K8s API — drop the auto-mounted SA token.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000           # matches Dockerfile.gateway `USER appuser` (uid 1000)
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: us-east1-docker.pkg.dev/project-8bbb04f8-fda8-462e-bc2/ai-identity/gateway:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: ai-identity-config
            - secretRef:
                name: ai-identity-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            failureThreshold: 15
            periodSeconds: 2
          # Required because readOnlyRootFilesystem: true. Covers Python tempfiles,
          # SQLAlchemy connection caches, gunicorn worker temp state, httpx caches.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
