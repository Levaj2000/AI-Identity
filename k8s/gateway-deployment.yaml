apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ai-identity
  labels:
    app: gateway
spec:
  replicas: 1
  # Surge a fully-ready new pod before terminating the old one. With
  # HPA minReplicas: 2 and maxUnavailable: 0, the rollout never drops
  # below the steady-state replica count — combined with the preStop
  # sleep below and BackendConfig.connectionDraining, this is what
  # keeps the GCE LB from sending traffic to a SIGTERM'd pod during
  # rolling deploys (root cause of the 2026-04-29 transient 502 on
  # gateway.ai-identity.co/health).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      # Bound to GCP SA ai-identity-workload@ via Workload Identity for
      # Secret Manager CSI access. See k8s/serviceaccount.yaml.
      serviceAccountName: ai-identity-workload
      # 60s > preStop sleep (15s) + gunicorn graceful shutdown budget.
      # Lets in-flight requests finish before SIGKILL.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000           # matches Dockerfile.gateway `USER appuser` (uid 1000)
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # Pinned by digest. CI overrides via `kubectl set image` on deploy.
          image: us-east1-docker.pkg.dev/project-8bbb04f8-fda8-462e-bc2/ai-identity/gateway@sha256:6791032b26fe07eba231f293d9e5e82c0672f0b3df7763ba4b37d67ff50207b5
          ports:
            - containerPort: 8002
          # See k8s/api-deployment.yaml for why we use a shell-wrapper CMD:
          # GKE Autopilot's CSI provider mounts files but doesn't synthesize
          # K8s Secrets, so the wrapper reads /mnt/secrets/<KEY> files and
          # exports them as env vars before exec'ing the original gunicorn.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              for f in /mnt/secrets/*; do
                [ -f "$f" ] || continue
                name=$(basename "$f")
                value=$(cat "$f")
                export "$name=$value"
              done
              exec gunicorn gateway.app.main:app \
                --workers 2 \
                --worker-class uvicorn.workers.UvicornWorker \
                --bind 0.0.0.0:8002 \
                --timeout 120 \
                --keep-alive 5
          envFrom:
            - configMapRef:
                name: ai-identity-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # preStop sleep gives the GCE LB / NEG controller time to mark
          # this pod's endpoint Unhealthy and stop routing new requests
          # before gunicorn starts its graceful shutdown. Without this,
          # in-flight + freshly-arriving requests during the propagation
          # window return 502 at the LB.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            failureThreshold: 15
            periodSeconds: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ai-identity-secrets
