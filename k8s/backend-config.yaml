# BackendConfig — attaches the Cloud Armor security policy `ai-identity-armor`
# to the GCE Load Balancer backend services fronting api-service and
# gateway-service.
#
# The Cloud Armor policy itself lives in GCP (not K8s). See
# scripts/setup-cloud-armor.sh for the idempotent gcloud commands that create
# and configure it (WAF preconfigured rules in preview mode, adaptive L7
# DDoS protection, per-IP throttling at 300 req/min).
#
# Attached via annotation on each Service:
#   cloud.google.com/backend-config: '{"default": "ai-identity-backend-config"}'

apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: ai-identity-backend-config
  namespace: ai-identity
spec:
  securityPolicy:
    name: ai-identity-armor
  # Enable access logging for all backend requests — pairs with Cloud Armor
  # deny logs for a complete audit trail when investigating incidents.
  logging:
    enable: true
    sampleRate: 1.0
  # Connection draining on the LB side. Default is 0s, which means in-flight
  # requests can fail the moment a NEG endpoint is removed during a rolling
  # deploy. 60s gives both the GCE LB and the pod's preStop sleep (15s) +
  # terminationGracePeriodSeconds (60s) enough overlap to drain cleanly.
  # Root cause of the 2026-04-29 transient 502 on gateway.ai-identity.co.
  connectionDraining:
    drainingTimeoutSec: 60
