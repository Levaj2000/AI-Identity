apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-identity-config
  namespace: ai-identity
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://ai-identity.co,https://www.ai-identity.co,https://dashboard.ai-identity.co,http://localhost:5173"
  CORS_ORIGIN_REGEX: "https://dashboard-.*-jeff-levas-projects\\.vercel\\.app"
  GATEWAY_URL: "http://gateway-service.ai-identity.svc.cluster.local:8002"
  API_KEY_PREFIX: "aid_sk_"
  ADMIN_KEY_PREFIX: "aid_admin_"
  APP_VERSION: "0.2.0"
  # Forensic signing key — GCP KMS key-version resource path. Consumed by
  # the session-close attestation router (#263) and the compliance-export
  # builder (#275). Workload Identity via ai-identity-forensic-signer SA
  # grants the API pod the `cloudkms.signerVerifier` role on this key.
  # Rotation (docs/forensics/key-rotation.md): bump the .../cryptoKeyVersions/N
  # suffix, redeploy, then disable the old version once all outstanding
  # attestations are verified. Old key versions stay ENABLED for verify.
  FORENSIC_SIGNING_KEY_ID: "projects/project-8bbb04f8-fda8-462e-bc2/locations/us-east1/keyRings/ai-identity-forensic/cryptoKeys/session-attestation/cryptoKeyVersions/1"
  # Stripe price IDs are public per-product identifiers (not secrets). Moved
  # here from the K8s Secret during the Secret Manager migration so sensitive
  # values (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET) remain in Secret Manager
  # while these public identifiers live in plain config.
  STRIPE_PRICE_ID_PRO: "price_1TEtzpANWtf2Ph76ICz5z7JT"
  STRIPE_PRICE_ID_PRO_ANNUAL: "price_1TEuCfANWtf2Ph7607PHDFit"
  STRIPE_PRICE_ID_BUSINESS: "price_1TEu1vANWtf2Ph76W5S5U2ME"
  STRIPE_PRICE_ID_BUSINESS_ANNUAL: "price_1TEu9uANWtf2Ph764zcV3BsJ"
