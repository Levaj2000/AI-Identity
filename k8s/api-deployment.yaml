apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-identity
  labels:
    app: api
spec:
  replicas: 1
  # See k8s/gateway-deployment.yaml for the rationale. Same shape, same
  # vulnerability — kept in lockstep so a future API rollout doesn't
  # reproduce the gateway's 2026-04-29 transient 502 incident.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # Bound to GCP SA ai-identity-forensic-signer@ via Workload Identity.
      # This SA rolls two capabilities onto the API pod:
      #
      #   1. KMS signerVerifier on the session-attestation key — needed by
      #      session-close attestation signing (#263) and compliance-export
      #      bundle signing (#275), both of which call KMS AsymmetricSign
      #      directly from this process.
      #   2. Per-secret secretmanager.secretAccessor on the 11 entries
      #      behind `ai-identity-secrets` SPC — needed by the Secret
      #      Manager CSI mount below.
      #
      # Both grants are provisioned atomically by
      # `scripts/setup-forensic-signer.sh` (re-run if you rotate secrets
      # or add new ones to the SPC).
      #
      # The dedicated-SA isolation described in
      # k8s/forensic-signer-serviceaccount.yaml is preserved for a FUTURE
      # split: moving export builds (and eventually attestation signs) to
      # a Cloud Run job per ADR-002 §"Build pipeline". Until that worker
      # lands, the API pod is the signer and needs both capabilities.
      serviceAccountName: ai-identity-forensic-signer
      # 60s > preStop sleep (15s) + gunicorn graceful shutdown budget.
      # Lets in-flight requests finish before SIGKILL.
      terminationGracePeriodSeconds: 60
      # automountServiceAccountToken left at the default (true) because the
      # Secret Manager CSI driver needs the projected SA token to exchange
      # for a GCP access token via Workload Identity. The token is for a SA
      # with ONLY secretmanager.secretAccessor (per-secret), no K8s API
      # privileges, so exposure risk is minimal.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000           # matches Dockerfile.api `USER appuser` (uid 1000)
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Pinned by digest. CI (.github/workflows/deploy-gke.yml) resolves
          # the newly built tag to its digest on each deploy and overrides
          # this via `kubectl set image`.
          image: us-east1-docker.pkg.dev/project-8bbb04f8-fda8-462e-bc2/ai-identity/api@sha256:ca247d293f8f6f2a1de957d8388a286c6ee10985a18f5a848c5c27def6e0c1cc
          ports:
            - containerPort: 8001
          # Shell-wrapper entrypoint: reads each file at /mnt/secrets/<KEY>
          # (populated by the Secret Manager CSI mount below) and exports it
          # as an env var before exec'ing the original gunicorn CMD from
          # Dockerfile.api. This is required because GKE Autopilot's managed
          # CSI provider mounts files but does not synthesize K8s Secrets,
          # so we can't use envFrom to surface them to the application.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              for f in /mnt/secrets/*; do
                [ -f "$f" ] || continue
                name=$(basename "$f")
                # Use read+IFS to handle any trailing newline safely; value keeps
                # internal bytes verbatim. NUL bytes would be stripped by read but
                # none of our secrets contain NULs (all are text).
                value=$(cat "$f")
                export "$name=$value"
              done
              exec gunicorn api.app.main:app \
                --workers 2 \
                --worker-class uvicorn.workers.UvicornWorker \
                --bind 0.0.0.0:8001 \
                --timeout 120 \
                --keep-alive 5 \
                --forwarded-allow-ips='*'
          envFrom:
            - configMapRef:
                name: ai-identity-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # preStop sleep gives the GCE LB / NEG controller time to mark
          # this pod's endpoint Unhealthy and stop routing new requests
          # before gunicorn starts its graceful shutdown. See gateway
          # deployment for the incident this prevents.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 30
            periodSeconds: 2
          # /tmp: required because readOnlyRootFilesystem: true. Covers Python
          # tempfiles, SQLAlchemy connection caches, gunicorn worker temp state.
          # /mnt/secrets: Secret Manager CSI mount — the shell wrapper above
          # reads these files at container start and exports them as env vars.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ai-identity-secrets
