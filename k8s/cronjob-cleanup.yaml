# Weekly inactive user cleanup (Sundays 04:00 UTC)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-user-cleanup
  namespace: ai-identity
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            # Targeted by NetworkPolicy `allow-cron-egress-to-api` and the
            # gateway/cron clause of `allow-internal-to-api`. Required for
            # this job to reach api-service:8001 under the namespace default-deny.
            tier: cron
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 100             # curlimages/curl ships as uid=100(curl_user)
            runAsGroup: 101            # gid=101(curl_group)
            fsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: curl
              # Pinned by digest (curlimages/curl:8.14.1 at time of pinning)
              image: curlimages/curl@sha256:9a6f6a17667960e077f1b153009aaf18ac99a622221084e1938a45a06fff057a
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "x-internal-key: $(INTERNAL_SERVICE_KEY)" \
                    "http://api-service.ai-identity.svc.cluster.local:8001/api/internal/cleanup/inactive-users?inactivity_days=90&dry_run=false"
              envFrom:
                - secretRef:
                    name: ai-identity-secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
          restartPolicy: OnFailure
