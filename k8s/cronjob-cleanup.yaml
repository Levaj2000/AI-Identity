# Weekly inactive user cleanup (Sundays 04:00 UTC)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-user-cleanup
  namespace: ai-identity
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            # Targeted by NetworkPolicy `allow-cron-egress-to-api` and the
            # gateway/cron clause of `allow-internal-to-api`. Required for
            # this job to reach api-service:8001 under the namespace default-deny.
            tier: cron
        spec:
          # Same SA as api/gateway — Workload Identity binding to the GCP SA
          # that has secretmanager.secretAccessor on ai-identity-INTERNAL_SERVICE_KEY.
          serviceAccountName: ai-identity-workload
          securityContext:
            runAsNonRoot: true
            runAsUser: 100             # curlimages/curl ships as uid=100(curl_user)
            runAsGroup: 101            # gid=101(curl_group)
            fsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: curl
              # Pinned by digest (curlimages/curl:8.14.1 at time of pinning)
              image: curlimages/curl@sha256:9a6f6a17667960e077f1b153009aaf18ac99a622221084e1938a45a06fff057a
              # Read INTERNAL_SERVICE_KEY from the Secret Manager CSI file mount.
              # Uses the narrow `ai-identity-cron-secrets` SPC which only exposes
              # this one secret, for least-privilege audit logging.
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "x-internal-key: $(cat /mnt/secrets/INTERNAL_SERVICE_KEY)" \
                    "http://api-service.ai-identity.svc.cluster.local:8001/api/internal/cleanup/inactive-users?inactivity_days=90&dry_run=false"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: secrets-store
                  mountPath: /mnt/secrets
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir: {}
            - name: secrets-store
              csi:
                driver: secrets-store-gke.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: ai-identity-cron-secrets
          restartPolicy: OnFailure
