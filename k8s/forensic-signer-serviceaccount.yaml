# Dedicated K8s ServiceAccount for workloads that sign forensic attestations
# at session close. Bound to the GCP SA
# `ai-identity-forensic-signer@project-8bbb04f8-fda8-462e-bc2.iam.gserviceaccount.com`
# via Workload Identity.
#
# Why a dedicated SA (not the shared ai-identity-workload):
# The bound GCP SA holds `roles/cloudkms.signerVerifier` on
#   projects/.../keyRings/ai-identity-forensic/cryptoKeys/session-attestation
# Keeping the binding tight to this K8s SA means api/gateway pods — which
# run under `ai-identity-workload` — cannot sign attestations. A full
# compromise of those pods therefore cannot forge forensic evidence.
#
# Provisioning: the GCP SA, KMS key, IAM binding, Workload Identity
# binding, and Cloud KMS audit logs are all created by
# `scripts/setup-forensic-signer.sh`. Apply this manifest afterward.
#
# Used by: workloads (to be added in sprint items #262 and #263) that
# perform AsymmetricSign calls at session close. Set
# `serviceAccountName: ai-identity-forensic-signer` on those pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-identity-forensic-signer
  namespace: ai-identity
  annotations:
    iam.gke.io/gcp-service-account: ai-identity-forensic-signer@project-8bbb04f8-fda8-462e-bc2.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/component: forensic-signer
    app.kubernetes.io/part-of: ai-identity
