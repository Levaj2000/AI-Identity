name: Deploy to GKE

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'gateway/**'
      - 'common/**'
      - 'alembic/**'
      - 'Dockerfile.*'
      - 'k8s/**'
      - 'cloudbuild.yaml'
  workflow_dispatch:

env:
  PROJECT_ID: project-8bbb04f8-fda8-462e-bc2
  REGION: us-east1
  CLUSTER: ai-identity
  REGISTRY: us-east1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          # gke-gcloud-auth-plugin: required for kubectl to use Connect Gateway
          # (normally installed by google-github-actions/get-gke-credentials,
          # which we bypass because of our us-east1 fleet membership).
          # beta: required for `gcloud beta container binauthz attestations
          # sign-and-create`. Pre-installing avoids the runtime prompt "You do
          # not currently have this command group installed" which `--quiet`
          # doesn't cover in non-interactive shells.
          install_components: 'gke-gcloud-auth-plugin, beta'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api \
            -t $REGISTRY/$PROJECT_ID/ai-identity/api:${{ github.sha }} \
            -t $REGISTRY/$PROJECT_ID/ai-identity/api:latest .
          docker push --all-tags $REGISTRY/$PROJECT_ID/ai-identity/api

      - name: Build and push Gateway image
        run: |
          docker build -f Dockerfile.gateway \
            -t $REGISTRY/$PROJECT_ID/ai-identity/gateway:${{ github.sha }} \
            -t $REGISTRY/$PROJECT_ID/ai-identity/gateway:latest .
          docker push --all-tags $REGISTRY/$PROJECT_ID/ai-identity/gateway

      # Route kubectl via Connect Gateway (us-east1-connectgateway.googleapis.com)
      # instead of the cluster's public control-plane endpoint. Lets us enable
      # Master Authorized Networks without whitelisting GitHub runner IP ranges.
      #
      # Requires fleet membership (registered in us-east1) + roles/gkehub.viewer
      # + roles/gkehub.gatewayEditor + roles/container.developer on the WIF SA
      # (granted out-of-band).
      #
      # We call `gcloud container fleet memberships get-credentials` directly
      # instead of `google-github-actions/get-gke-credentials@v2 use_connect_gateway`
      # because that action assumes the membership lives at location=global, and
      # ours is in us-east1.
      - name: Configure kubectl via Connect Gateway
        run: |
          gcloud container fleet memberships get-credentials ${{ env.CLUSTER }} \
            --project=${{ env.PROJECT_ID }} \
            --location=${{ env.REGION }}

      # Resolve each freshly-pushed SHA tag to its content digest so that
      # the cluster pulls the image by `@sha256:...` rather than by tag.
      # Digest pinning prevents tag mutation attacks (someone overwriting a
      # tag in Artifact Registry) and makes provenance unambiguous.
      - name: Resolve image digests
        id: digests
        run: |
          API_DIGEST=$(gcloud artifacts docker images describe \
            $REGISTRY/$PROJECT_ID/ai-identity/api:${{ github.sha }} \
            --format='value(image_summary.digest)')
          GATEWAY_DIGEST=$(gcloud artifacts docker images describe \
            $REGISTRY/$PROJECT_ID/ai-identity/gateway:${{ github.sha }} \
            --format='value(image_summary.digest)')
          if [[ -z "$API_DIGEST" || -z "$GATEWAY_DIGEST" ]]; then
            echo "::error::failed to resolve image digest(s)"
            exit 1
          fi
          echo "api_digest=$API_DIGEST"     >> $GITHUB_OUTPUT
          echo "gateway_digest=$GATEWAY_DIGEST" >> $GITHUB_OUTPUT
          echo "api     → $API_DIGEST"
          echo "gateway → $GATEWAY_DIGEST"

      # Binary Authorization: sign each image's digest with our KMS key and
      # create an attestation Occurrence so the cluster admission controller
      # can verify provenance. The policy is in DRYRUN_AUDIT_LOG_ONLY mode
      # initially, so a missing attestation will log but not block. After we
      # observe valid attestations in prod, the policy flips to ENFORCED.
      #
      # Attestor: ai-identity-attestor (us-east1 KMS key `binauth/attestor-key`).
      # Idempotent — re-running against the same digest returns the existing
      # attestation rather than erroring.
      - name: Sign images with Binary Authorization
        run: |
          set -o pipefail  # propagate the gcloud exit code past the pipe
          for spec in "api:${{ steps.digests.outputs.api_digest }}" "gateway:${{ steps.digests.outputs.gateway_digest }}"; do
            IMAGE="${spec%%:*}"
            DIGEST="${spec#*:}"
            URL="$REGISTRY/$PROJECT_ID/ai-identity/$IMAGE@$DIGEST"
            echo "→ signing $URL"
            # `sign-and-create` is in the `beta` track — it prints a one-time
            # "Do you want to continue (Y/n)?" prompt which deadlocks in CI
            # without --quiet. Idempotent — signing the same digest twice
            # returns the existing Occurrence rather than erroring.
            gcloud beta container binauthz attestations sign-and-create \
              --quiet \
              --artifact-url="$URL" \
              --attestor=ai-identity-attestor \
              --attestor-project="$PROJECT_ID" \
              --keyversion=1 \
              --keyversion-project="$PROJECT_ID" \
              --keyversion-location="$REGION" \
              --keyversion-keyring=binauth \
              --keyversion-key=attestor-key
          done

      # Run Alembic migrations BEFORE rolling out new pods. If this step
      # fails, no new code reaches prod — the old pods keep serving the
      # old schema. Uses the API image we just signed (Binary Auth admits
      # it) + the ai-identity-workload SA for Secret Manager access to
      # DATABASE_URL. Idempotent: `alembic upgrade head` is a no-op once
      # the chain is current.
      #
      # Deliberately a k8s Job (not a deployment initContainer) so we get
      # an explicit completion signal and logs that survive pod restarts.
      - name: Run Alembic migrations
        run: |
          set -o pipefail
          API_IMAGE="$REGISTRY/$PROJECT_ID/ai-identity/api@${{ steps.digests.outputs.api_digest }}"

          # Clear any completed / failed Job from a prior deploy before
          # re-applying the manifest (Job spec is immutable once created).
          kubectl delete job alembic-migrate \
            -n ai-identity \
            --ignore-not-found=true \
            --wait=true

          # Substitute the image digest into the Job manifest and apply.
          sed "s|IMAGE_PLACEHOLDER|$API_IMAGE|" k8s/migration-job.yaml \
            | kubectl apply -f -

          # Block on completion. The rollout stays on old pods until this
          # succeeds. 300s covers 3 migrations + reconciliation + backfill
          # with generous headroom; cold-start on Autopilot adds ~30-60s.
          if ! kubectl wait --for=condition=complete \
                 job/alembic-migrate \
                 -n ai-identity \
                 --timeout=300s; then
            echo "::error::Alembic migration Job did not complete in 300s"
            echo "── Job describe ──"
            kubectl describe job/alembic-migrate -n ai-identity || true
            echo "── Pod logs ──"
            kubectl logs -n ai-identity -l app=alembic-migrate --tail=500 || true
            exit 1
          fi

          # Surface migration output in the CI log so a successful run
          # still shows which revisions ran.
          echo "── Migration Job logs ──"
          kubectl logs -n ai-identity -l app=alembic-migrate --tail=200

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/api \
            api=$REGISTRY/$PROJECT_ID/ai-identity/api@${{ steps.digests.outputs.api_digest }} \
            -n ai-identity
          kubectl set image deployment/gateway \
            gateway=$REGISTRY/$PROJECT_ID/ai-identity/gateway@${{ steps.digests.outputs.gateway_digest }} \
            -n ai-identity
          kubectl rollout status deployment/api -n ai-identity --timeout=120s
          kubectl rollout status deployment/gateway -n ai-identity --timeout=120s
