<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary Meta -->
    <title>AI Identity — Identity for AI Agents</title>
    <meta
      name="description"
      content="Per-agent API keys, scoped permissions, and audit trails for AI agents. Think Okta for agents. Deploy in 15 minutes."
    />
    <meta
      name="keywords"
      content="AI agents, API keys, agent identity, non-human identity, NHI, audit trail, LangChain, CrewAI, agent permissions"
    />
    <meta name="author" content="AI Identity" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ai-identity.co/" />
    <meta property="og:title" content="AI Identity — Identity for AI Agents" />
    <meta
      property="og:description"
      content="Per-agent API keys, scoped permissions, and audit trails for AI agents. Deploy in 15 minutes, not 15 weeks."
    />
    <meta property="og:site_name" content="AI Identity" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Identity — Identity for AI Agents" />
    <meta
      name="twitter:description"
      content="Per-agent API keys, scoped permissions, and audit trails for AI agents. Deploy in 15 minutes."
    />

    <!-- Theme -->
    <meta name="theme-color" content="#0F172A" />
    <meta name="color-scheme" content="dark light" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Vercel Analytics (loaded after deploy, safe to include now) -->
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <script>
      // Prevent FOUC: set dark class before first paint
      ;(function () {
        var t = localStorage.getItem('ai-identity-theme')
        if (t === 'light') document.documentElement.classList.remove('dark')
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
