<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none" role="img" aria-label="AI Identity — The Standard for AI Forensics">
  <title>AI Identity</title>

  <defs>
    <linearGradient id="aiid-shield-stroke-wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A86C8"/>
      <stop offset="0.5" stop-color="#1F5694"/>
      <stop offset="1" stop-color="#143E73"/>
    </linearGradient>
    <linearGradient id="aiid-letter-wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2F7CC2"/>
      <stop offset="0.6" stop-color="#1E5694"/>
      <stop offset="1" stop-color="#10325F"/>
    </linearGradient>
  </defs>

  <!-- Shield mark (scaled inline) -->
  <g transform="translate(0, 0)">
    <path
      d="M30 22
         C30 13 38 8 47 8
         L153 8
         C162 8 170 13 170 22
         L170 110
         C170 158 138 192 100 210
         C62 192 30 158 30 110 Z
         M45 32
         C45 27 49 24 54 24
         L146 24
         C151 24 155 27 155 32
         L155 108
         C155 150 124 178 100 191
         C76 178 45 150 45 108 Z"
      fill="url(#aiid-shield-stroke-wm)"
      fill-rule="evenodd"
    />
    <path
      d="M62 156
         L90 60
         L110 60
         L138 156
         L122 156
         L115 130
         L85 130
         L78 156 Z
         M89 116
         L111 116
         L100 78 Z"
      fill="url(#aiid-letter-wm)"
      fill-rule="evenodd"
    />
    <rect x="146" y="92" width="12" height="64" rx="1.5" fill="url(#aiid-letter-wm)"/>
    <circle cx="152" cy="80" r="6.5" fill="url(#aiid-letter-wm)"/>
  </g>

  <!-- Wordmark: "AI IDENTITY" + tagline. Uses currentColor so it inherits from parent. -->
  <g fill="currentColor" style="color: #1B2D4E;">
    <!-- AI IDENTITY: tall, slightly condensed sans-serif tracking -->
    <text x="200" y="125" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="74" letter-spacing="1">AI IDENTITY</text>
    <text x="200" y="170" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="500" font-size="20" letter-spacing="3" opacity="0.78">THE STANDARD FOR AI FORENSICS</text>
  </g>
</svg>
